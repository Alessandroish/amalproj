<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>3D-куб · amalproj</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <!-- Three.js -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
    }
  }
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #07120c; --fg: #54ff97; --muted: #3f9e6c;
      --blue: #46ff9b; --blue-2: #9bffcb;
    }
    body {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow: hidden;
    }

    /* свечение за кубом (чтобы чёрный куб читался на тёмном) */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(closest-side at 50% 50%,
                  rgba(70,255,155,.18), transparent 62%);
    }
    /* CRT скан-линии */
    body .crt {
      position: fixed; inset: 0; z-index: 50; pointer-events: none;
      background:
        repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0 2px, rgba(0,20,8,.16) 2px 4px),
        radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,.45) 100%);
    }

    /* контейнер для куба на весь экран */
    .cube-stage { position: fixed; inset: 0; z-index: 1; }
    .cube-canvas { position: absolute; inset: 0; cursor: grab; }
    .cube-canvas:active { cursor: grabbing; }

    /* шапка-пилюля (как на сайте) */
    nav {
      position: fixed; top: 1.1rem; left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 2.4rem); max-width: 1160px;
      z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: .7rem .7rem .7rem 1.6rem;
      border-radius: 12px;
      background: rgba(13,28,19,.88);
      border: 1px solid var(--border, rgba(70,255,155,.26));
      box-shadow: 0 10px 30px rgba(0,0,0,.4), inset 0 0 18px rgba(70,255,155,.05);
    }
    nav .logo { font-size: .9rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }
    nav a.back {
      padding: .62rem 1.4rem; border-radius: 8px;
      background: linear-gradient(135deg, var(--blue), var(--blue-2));
      color: #062012; text-decoration: none;
      font-size: .72rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      box-shadow: 0 0 20px rgba(70,255,155,.35);
      transition: transform .2s, box-shadow .25s, filter .2s;
    }
    nav a.back:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(15,157,110,.45); filter: brightness(1.06); }
    nav a.back:active { transform: scale(.95); }

    .eyebrow {
      position: fixed; left: 50%; top: 6.5rem;
      transform: translateX(-50%);
      z-index: 5; color: var(--muted);
      font-size: .7rem; letter-spacing: .22em; text-transform: uppercase;
      pointer-events: none;
    }
    .stage-caption {
      position: fixed; left: 50%; bottom: 2.6rem;
      transform: translateX(-50%);
      z-index: 5; text-align: center; pointer-events: none;
    }
    .stage-caption h1 {
      font-size: clamp(1.8rem, 6vw, 3.4rem);
      font-weight: 800; letter-spacing: -.03em;
    }
    .stage-caption h1 span { color: var(--blue); }
    .stage-caption p {
      margin-top: .6rem; color: var(--muted);
      font-size: .85rem; letter-spacing: .04em;
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">amalproj</div>
    <a href="/" class="back">← На главную</a>
  </nav>

  <p class="eyebrow">Интерактивный 3D-объект</p>

  <!-- сюда рендерится куб -->
  <div class="cube-stage" data-cube></div>
  <div class="crt"></div>

  <div class="stage-caption">
    <h1>Покрути <span>куб</span></h1>
    <p>Зажмите и потяните — куб вращается за движением</p>
  </div>

  <script type="module" src="/static/js/cube.js?v=32"></script>
</body>
</html>
