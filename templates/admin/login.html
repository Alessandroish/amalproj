<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Вход · amalproj admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/admin.css"/>
</head>
<body class="login-page">
  <form class="login-card" method="post" action="/admin/login">
    <div class="brand">amalproj <span>admin</span></div>
    <p class="login-sub">Вход в панель управления</p>

    {% if error %}<div class="login-error">{{ error }}</div>{% endif %}

    <label>Логин
      <input type="text" name="username" autocomplete="username" required autofocus>
    </label>
    <label>Пароль
      <input type="password" name="password" autocomplete="current-password" required>
    </label>
    <label>PIN-код
      <input type="password" name="pin" inputmode="numeric" required>
    </label>

    <button type="submit">Войти</button>
  </form>
</body>
</html>
